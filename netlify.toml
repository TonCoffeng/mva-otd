[build]
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

# SPA-fallback: alle routes naar index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Geplande koppeling: betaalde courtagenota's -> bijbehorende OTD archiveren (elke 15 min)
[functions."otd-archief-sync"]
  schedule = "*/15 * * * *"
